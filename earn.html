    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gameDark: 'rgb(var(--bg-primary-rgb) / <alpha-value>)',
                        gameCard: 'rgb(var(--bg-card-rgb) / <alpha-value>)',
                        gameCardLight: 'rgb(var(--bg-card-light-rgb) / <alpha-value>)',
                        booyahOrange: '#FF6B00',
                        booyahYellow: '#FFCC00',
                        fireRed: '#E30052',
                        cyberBlue: '#00F0FF',
                        textDim: 'rgb(var(--text-dim-rgb) / <alpha-value>)',
                        tPrimary: 'rgb(var(--text-primary-rgb) / <alpha-value>)',
                        tBorder: 'rgb(var(--border-color-rgb) / <alpha-value>)'
                    },
                    fontFamily: { game: ['Inter', 'sans-serif'] }

    <style>
        body { background-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modal animation */
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .box-open { animation: boxPop 0.8s cubic-bezier(0.68, -0.55, 0.26, 1.55) forwards; }
        @keyframes boxPop { 0% { transform: scale(0.8) rotate(0deg); } 50% { transform: scale(1.2) rotate(15deg); } 100% { transform: scale(1) rotate(0deg); } }

        /* Custom Box Animations */
        .anim-box-ping { animation: boxPing 0.4s ease-out forwards; }
        @keyframes boxPing {
            0% { transform: scale(1); opacity: 1; filter: brightness(1); }
            50% { transform: scale(1.4); opacity: 0.8; filter: brightness(1.5); }
            100% { transform: scale(0); opacity: 0; }
        }

        .anim-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes zoomIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Circular progress ring */
        .timer-ring-bg { stroke: rgba(255,255,255,0.08); }
        .timer-ring-progress { 
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 6px rgba(255, 204, 0, 0.6));
        }

        /* Glow pulse for available state */
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 204, 0, 0.3), 0 0 40px rgba(255, 204, 0, 0.1); }
            50% { box-shadow: 0 0 30px rgba(255, 204, 0, 0.5), 0 0 60px rgba(255, 204, 0, 0.2); }
        }
        .glow-pulse { animation: glowPulse 2s ease-in-out infinite; }

        /* Floating coins animation */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(0.5); opacity: 0; }
        }
        .float-coin { animation: floatUp 1.5s ease-out forwards; }
    </style>
</head>

    <!-- SCRIPT LOGIC FOR REWARDS -->
    <script>
        // ★ SERVER TIME OFFSET — Anti-Cheat System ★
        let serverTimeOffset = 0;

        function getServerTime() {
            return Date.now() + serverTimeOffset;
        }

        // Get server time offset from Firebase Realtime Database
        firebase.database().ref('.info/serverTimeOffset').on('value', (snap) => {
            serverTimeOffset = snap.val() || 0;
            console.log('[Earn] Server time offset:', serverTimeOffset, 'ms');
        });

        // ★ PREMIUM TOAST SYSTEM
        function showToast(message, type = 'success', duration = 3000) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = 'pointer-events-auto';
            const colors = {
                success: { border: 'border-emerald-400/40', bg: 'from-emerald-500/15 to-emerald-900/10', text: 'text-emerald-300', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>', glow: 'shadow-[0_0_20px_rgba(16,185,129,0.2)]' },
                error:   { border: 'border-red-400/40', bg: 'from-red-500/15 to-red-900/10', text: 'text-red-300', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>', glow: 'shadow-[0_0_20px_rgba(220,38,38,0.2)]' },
                warning: { border: 'border-booyahOrange/40', bg: 'from-booyahOrange/15 to-orange-900/10', text: 'text-orange-300', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z"/></svg>', glow: 'shadow-[0_0_20px_rgba(255,107,0,0.2)]' }
            };
            const c = colors[type] || colors.success;
            toast.innerHTML = `<div class="bg-gradient-to-r ${c.bg} backdrop-blur-md border ${c.border} rounded-xl px-4 py-3 flex items-center gap-3 ${c.glow} transform translate-y-[-20px] opacity-0 transition-all duration-300" style="min-width:200px;"><div class="${c.text} shrink-0">${c.icon}</div><p class="text-[11px] font-bold ${c.text} flex-1 font-game tracking-wide leading-snug">${message}</p></div>`;
            container.appendChild(toast);
            requestAnimationFrame(() => { const inner = toast.querySelector('div'); if(inner){inner.style.transform='translateY(0)';inner.style.opacity='1';} });
            setTimeout(() => { const inner = toast.querySelector('div'); if(inner){inner.style.transform='translateY(-20px)';inner.style.opacity='0';} setTimeout(()=>toast.remove(),300); }, duration);
        }

        // ★ PREMIUM Custom Alert
        function showCustomAlert(msg, type = 'info') {
            const modal = document.getElementById('custom-modal');
            const modalBody = document.getElementById('custom-modal-body');
            
            if (type === 'mystery' || type === 'reward') {
                const color = type === 'mystery' ? 'booyahYellow' : 'cyberBlue';
                const colorSec = type === 'mystery' ? 'booyahOrange' : 'blue-500';
                
                modalBody.innerHTML = `
                    <div id="reward-box-container" class="cursor-pointer relative flex flex-col items-center justify-center transform transition-all hover:scale-110 active:scale-95" onclick="openRewardBox('${type}', \`${msg}\`)">
                        <div class="absolute inset-0 bg-${color}/20 blur-xl rounded-full scale-150 animate-pulse"></div>
                        <svg class="w-24 h-24 text-${color} relative z-10 drop-shadow-[0_0_15px_currentColor] animate-bounce" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 6h-2.18c.11-.31.18-.65.18-1a2.996 2.996 0 0 0-5.5-1.65l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1h-4v-2h4zM9 4c.55 0 1 .45 1 1h-4c0-.55.45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76 12 7.4l1 1.36L15.38 12 17 10.83 14.92 8H20v6z"/>
                        </svg>
                        <h4 class="mt-4 font-game font-bold text-white text-[12px] tracking-widest animate-pulse border border-${color}/50 px-4 py-1 rounded-full bg-${color}/10">TAP TO OPEN!</h4>
                    </div>
                    
                    <div id="reward-result" class="hidden flex-col items-center w-full">
                    </div>
                `;
            } else {
                const isError = type === 'error';
                modalBody.innerHTML = `
                    <div class="mb-3">
                        <div class="w-12 h-12 rounded-full ${isError ? 'bg-fireRed/10 border-fireRed/30' : 'bg-cyberBlue/10 border-cyberBlue/30'} border flex items-center justify-center mx-auto">
                            <svg class="w-6 h-6 ${isError?'text-fireRed':'text-cyberBlue'} drop-shadow-[0_0_6px_rgba(0,240,255,0.4)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                    </div>
                    <p class="text-[11px] text-white/90 text-center whitespace-pre-line font-semibold leading-relaxed">${msg}</p>
                    <button onclick="document.getElementById('custom-modal').classList.add('hidden')" class="mt-5 w-full bg-gameCardLight border border-tBorder/10 text-tPrimary font-game font-bold text-[11px] py-2.5 rounded-xl active:scale-95 transition-all tracking-wider hover:bg-white/5">OK</button>
                `;
            }
            modal.classList.remove('hidden');
        }

        function openRewardBox(type, msg) {
            const boxContainer = document.getElementById('reward-box-container');
            const resultDiv = document.getElementById('reward-result');
            
            const color = type === 'mystery' ? 'booyahYellow' : 'cyberBlue';
            const colorSec = type === 'mystery' ? 'booyahOrange' : 'blue-500';

            boxContainer.classList.add('anim-box-ping');
            
            setTimeout(() => {
                boxContainer.classList.add('hidden');
                resultDiv.classList.remove('hidden');
                resultDiv.classList.add('anim-zoom-in');
                
                resultDiv.innerHTML = `
                    <div class="relative w-20 h-20 flex items-center justify-center mb-4">
                        <div class="absolute inset-0 bg-gradient-to-br from-${color}/50 to-transparent rounded-full blur-xl animate-pulse"></div>
                        <svg class="w-16 h-16 text-${color} drop-shadow-[0_0_20px_currentColor] relative z-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <h3 class="font-game font-black text-${color} text-[14px] mb-1 text-center tracking-[0.2em] uppercase">REWARD CLAIMED!</h3>
                    <div class="w-16 h-[2px] bg-gradient-to-r from-transparent via-${color}/60 to-transparent mb-4"></div>
                    <p class="text-[12px] text-white/95 text-center whitespace-pre-line font-bold leading-relaxed mb-6">${msg}</p>
                    <button onclick="document.getElementById('custom-modal').classList.add('hidden')" class="w-full bg-gradient-to-r from-${colorSec} to-${color} ${type==='mystery'?'text-gameDark':'text-white'} font-game font-black tracking-[0.15em] text-[12px] py-3.5 rounded-xl hover:brightness-110 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,204,0,0.2)]">AWESOME!</button>
                `;
            }, 350);
        }

        // ★ COOLDOWN — 24 HOURS
        const COOLDOWN_MS = 24 * 60 * 60 * 1000;

        function claimDaily() {
            if (!auth.currentUser) return;
            if (window.isClaiming) return;
            
            // Check Cooldown using SERVER TIME
            if (window.lastClaimTime) {
                const serverNow = getServerTime();
                let lastClaimMs;
                
                // Handle Firestore Timestamp or plain number
                if (window.lastClaimTime.toMillis) {
                    lastClaimMs = window.lastClaimTime.toMillis();
                } else if (window.lastClaimTime.seconds) {
                    lastClaimMs = window.lastClaimTime.seconds * 1000;
                } else {
                    lastClaimMs = window.lastClaimTime;
                }
                
                const timePassed = serverNow - lastClaimMs;
                if (timePassed < COOLDOWN_MS) {
                    showCustomAlert(`You have already claimed recently!\nPlease wait for the timer to reset.`, 'error');
                    return;
                }
            }

            window.isClaiming = true;
            window.location.href = 'ads.html';
        }
    </script>
    <script>
        // ★ FAILSAFE: Force-remove loader after 5 seconds
        setTimeout(() => {
            const loader = document.getElementById('global-loader');
            if (loader) {
                loader.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => loader.remove(), 500);
            }
        }, 5000);

        function hideLoader() {
            const skeleton = document.getElementById('skeleton-view');
            const content = document.getElementById('main-content');
            
            if (skeleton && content) {
                skeleton.remove();
                content.classList.remove('hidden', 'opacity-0');
                content.classList.add('row-animate');
            }
        }

        // ★★★ INSTANT CACHE SYSTEM for Header Stats ★★★
        function applyUserData(data) {
            const coinEl = document.getElementById('header-coins');
            const diaEl = document.getElementById('header-diamonds');
            const statCoins = document.getElementById('stat-coins');
            const statDia = document.getElementById('stat-diamonds');
            
            if (coinEl) coinEl.textContent = Number(data.coins || 0).toLocaleString();
            if (diaEl) diaEl.textContent = Number(data.diamonds || 0).toLocaleString();
            if (statCoins) statCoins.textContent = Number(data.coins || 0).toLocaleString();
            if (statDia) statDia.textContent = Number(data.diamonds || 0).toLocaleString();
        }

        function saveToCache(data) {
            try {
                const cache = {
                    diamonds: data.diamonds || 0,
                    coins: data.coins || 0
                };
                localStorage.setItem('booyah_earn_cache', JSON.stringify(cache));
            } catch(e) { /* ignore storage errors */ }
        }

        // ★ STEP 1: Load cached data INSTANTLY (no server wait!)
        try {
            const cached = JSON.parse(localStorage.getItem('booyah_earn_cache'));
            if (cached) {
                applyUserData(cached);
                hideLoader();
            }
        } catch(e) {}

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = db.collection('users').doc(user.uid);
                userRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        
                        applyUserData(data);
                        saveToCache(data);

                        // Use the Firestore Timestamp directly (server-authoritative)
                        window.lastClaimTime = data.lastClaimTime || null;
                        
                        renderDailyCheckinState();
                    } else {
                        // Doc doesn't exist — recreate with defaults
                        userRef.set({
                            nickname: 'GAMER',
                            uid: (Math.floor(Math.random() * 900000000) + 100000000).toString(),
                            avatar: 'images/avatar/default_male.webp',
                            diamonds: 0,
                            coins: 0
                        }).catch(e => console.error('[Earn] Failed to recreate user doc:', e));
                    }
                    hideLoader();
                }, (error) => {
                    console.error('[Earn] Firestore error:', error.message);
                    hideLoader();
                });
            } else {
                hideLoader();
                window.parent.postMessage({ type: 'NAVIGATE', route: 'login.html' }, '*');
            }
        });

        // ★ RENDER DAILY CHECK-IN STATE using SERVER TIME ★
        let timerInterval = null;
        const TIMER_RING_CIRCUMFERENCE = 2 * Math.PI * 52; // ~327

        function renderDailyCheckinState() {
            const timerEl = document.getElementById('daily-timer');
            const claimBtn = document.getElementById('daily-claim-btn');
            const lockedBtn = document.getElementById('daily-locked-btn');
            const stateAvail = document.getElementById('state-available');
            const stateLocked = document.getElementById('state-locked');
            const timerDisplay = document.getElementById('timer-display');
            const timerRing = document.getElementById('timer-ring');
            
            if (timerInterval) clearInterval(timerInterval);
            
            const serverNow = getServerTime();
            let lastClaimMs = 0;
            
            if (window.lastClaimTime) {
                if (window.lastClaimTime.toMillis) {
                    lastClaimMs = window.lastClaimTime.toMillis();
                } else if (window.lastClaimTime.seconds) {
                    lastClaimMs = window.lastClaimTime.seconds * 1000;
                } else {
                    lastClaimMs = window.lastClaimTime;
                }
            }
            
            const timePassed = serverNow - lastClaimMs;
            
            if (lastClaimMs > 0 && timePassed < COOLDOWN_MS) {
                // ★ LOCKED — Show timer
                const endTime = lastClaimMs + COOLDOWN_MS;
                
                stateAvail.classList.add('hidden');
                stateAvail.classList.remove('flex');
                stateLocked.classList.remove('hidden');
                stateLocked.classList.add('flex');
                claimBtn.classList.add('hidden');
                lockedBtn.classList.remove('hidden');
                
                // Timer badge style
                timerEl.parentElement.classList.remove('border-emerald-500/50');
                timerEl.parentElement.classList.add('border-booyahOrange/30');
                timerEl.classList.remove('text-emerald-400');
                timerEl.classList.add('text-booyahOrange');
                
                function updateTimer() {
                    const currentServerTime = getServerTime();
                    const remaining = endTime - currentServerTime;
                    
                    if (remaining <= 0) {
                        clearInterval(timerInterval);
                        renderDailyCheckinState(); // Re-render when time is up!
                        return;
                    }
                    
                    const s = Math.floor((remaining / 1000) % 60);
                    const m = Math.floor((remaining / (1000 * 60)) % 60);
                    const h = Math.floor((remaining / (1000 * 60 * 60)));
                    
                    const timeString = `${h}h ${m}m ${s}s`;
                    const shortTime = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
                    
                    timerEl.innerText = `RESETS IN ${timeString}`;
                    timerDisplay.innerText = shortTime;
                    
                    // Update ring progress
                    const progress = remaining / COOLDOWN_MS;
                    const offset = TIMER_RING_CIRCUMFERENCE * (1 - progress);
                    timerRing.style.strokeDashoffset = offset;
                }
                
                updateTimer(); // Initial
                timerInterval = setInterval(updateTimer, 1000);
                
            } else {
                // ★ AVAILABLE — Show claim button
                stateAvail.classList.remove('hidden');
                stateAvail.classList.add('flex');
                stateLocked.classList.add('hidden');
                stateLocked.classList.remove('flex');
                claimBtn.classList.remove('hidden');
                lockedBtn.classList.add('hidden');
                
                // Timer badge style — green
                timerEl.parentElement.classList.remove('border-booyahOrange/30');
                timerEl.parentElement.classList.add('border-emerald-500/50');
                timerEl.classList.remove('text-booyahOrange');
                timerEl.classList.add('text-emerald-400');
                timerEl.innerText = "AVAILABLE NOW!";
            }
        }

        async function openTelegramBot() {
            try {
                const snap = await firebase.database().ref('settings/telegram_bot_url').once('value');
                const url = snap.val();
                
                if (url) {
                    window.open(url, '_blank');
                } else {
                    showCustomAlert("Telegram bot is currently unavailable. Check back later!", "warning");
                }
            } catch(e) {
                console.error("Error fetching telegram bot url:", e);
                showCustomAlert("Failed to fetch bot link.", "error");
            }
        }
    </script>
</body>
</html>
